<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us | DevPulse Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .contact-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
        }

        .quote {
            font-size: 20px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 15px;
        }

        .quote-desc {
            color: #94a3b8;
        }

        @media(max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

   <header>
    <h1>DevPulse Solutions</h1>

    <!-- Hamburger -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>

        <div class="dropdown">
            <a href="service.html" class="dropbtn" onclick="toggleDropdown(event)">Services</a>

         
        </div>

        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Let’s Build Something Great</h2>
    <p>Tell us about your project and we’ll help you grow online.</p>
</section>

<section>
    <div class="contact-container">

        <!-- LEFT SIDE (QUOTE + INFO) -->
        <!-- <div class="contact-box">
            <p class="quote">
                “Your website is not just your online presence — it’s your best salesperson.”
            </p>
            <p class="quote-desc">
                At DevPulse Solutions, we create websites and marketing strategies that don’t just look good,
                but actually bring customers and grow your business.
            </p>

            <br><br>

            <h3>Direct Contact</h3>

                📧 Email: your@email.com <br><br>

        <!-- RIGHT SIDE (FORM) -->
        <div class="contact-box">

            <h2 style="text-align:center;">Send an Enquiry</h2>

            <form action="#" method="post" class="contact-form">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label>Service Interested In</label>
                    <select name="service">
                        <option>Website Development</option>
                        <option>SEO</option>
                        <option>Social Media Marketing</option>
                        <option>Paid Ads</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Message</label>
                    <textarea name="message" rows="5" placeholder="Tell us about your project"></textarea>
                </div>

                <button type="submit" class="btn">Submit Enquiry</button>

            </form>

        </div>

    </div>
</section>

<footer>
    © 2026 DevPulse Solutions
</footer>

</body>

</html>
